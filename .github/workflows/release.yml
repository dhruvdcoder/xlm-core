name: Release xlm-core

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.1.4 or 0.1.4-alpha)"
        required: true
        type: string
      dry_run:
        description: "Dry run (no push or GitHub release)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  actions: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARGS=("${{ inputs.version }}" --yes)
          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            ARGS+=(--dry-run)
          fi
          python .github/release.py "${ARGS[@]}"

      # Releases created with GITHUB_TOKEN do not emit release:published to other
      # workflows. Chain PyPI + docs explicitly (local gh release still uses the event).
      - name: Trigger PyPI and docs deploy
        if: ${{ inputs.dry_run != true }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ inputs.version }}"
          VERSION="${VERSION#v}"
          TAG="v${VERSION}"
          gh workflow run "Upload Python Package" --ref main -f "tag_name=${TAG}"
          gh workflow run "Deploy Release Docs to GitHub Pages" --ref main -f "tag_name=${TAG}"
