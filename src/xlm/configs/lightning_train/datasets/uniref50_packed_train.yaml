defaults:
  - default_text

_target_: xlm.datamodule.DatasetManager
collator: ??? # model specific collator
full_name: airkingbd/uniref50/train
full_name_debug: airkingbd/uniref50/train
preprocess_function: xlm.tasks.uniref50.preprocess_fn
# No max_seq_len truncation here so the random crop in pack_sequences_fn has
# the full sequence to sample from.  Very long proteins are stored at their
# natural length; the crop to block_size happens on-the-fly below.
on_the_fly_processor: null
on_the_fly_group_processor: xlm.tasks.uniref50.pack_sequences_fn
on_the_fly_group_processor_kwargs:
  drop_last: true
columns_to_remove:
  - seq
  - length
stages:
  - fit
iterable_dataset_shards: 256
shuffle_buffer_size: 10000
shuffle_seed: 42
split_by_node: true
dataloader_kwargs:
  batch_size: ${per_device_batch_size}
  num_workers: ${num_dataloader_workers}
  shuffle: null
  pin_memory: ${dataloader_pin_memory}
  persistent_workers: ${dataloader_persistent_workers}
  prefetch_factor: ${dataloader_prefetch_factor}
  drop_last: true
model_name: null
