# @package _global_
defaults:
  - text_flexmdm
  - override /datamodule: lm1b_flexmdm

per_device_batch_size: 128
global_batch_size: 512
block_size: 128
num_dataloader_workers: 5

model:
  force_flash_attn: false # flash_attn won't work with attention mask (padded sequences)
  len_head_type: mlp

datamodule:
  print_batch_fn: flexmdm.datamodule_flexmdm.print_batch_flexmdm

predictor:
  confidence: null
  top_k: null
  top_p: 0.9

trainer:
  max_steps: 1000_000
  val_check_interval: 25000 #
  num_sanity_val_steps: 3
  check_val_every_n_epoch: null

optimizer:
  lr: 0.0001

lr_scheduler:
  name: "constant_with_warmup"
  num_warmup_steps: 2000
  num_training_steps: ${trainer.max_steps}
  monitor: "train/loss"



callbacks:
  checkpoint_every_n_steps:
    every_n_train_steps: 2500
    keep_multiple: 40 # Keep every (keep_multiple * every_n_train_steps) permanently = 2500 * 40 = 100_000 