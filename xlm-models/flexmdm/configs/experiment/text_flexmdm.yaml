# @package _global_
defaults:
  - override /noise_schedule: flexmdm_linear # default
  - override /model_type: flexmdm 
  - override /model: ddit_flexmdm
  

per_device_batch_size: 64
global_batch_size: 512
block_size: ???
len_predict_type: expectation
monitored_metric: val/lm/accumulated_loss

predictor:
  # tau-leaping
  top_k: null
  top_p: null
  confidence: null

model:
  inner_autocast: true
  compile: true
  len_head_type: linear
  len_predict_type: expectation
  force_flash_attn: true

log_predictions:
  fields_to_keep_in_output:
    - text
    - time_taken

callbacks:
  checkpoint_monitor:
    monitor: val/lm/accumulated_loss
  checkpoint_every_n_steps:
    every_n_train_steps: 2500
    keep_multiple: 40 # Keep every (keep_multiple * every_n_train_steps) permanently = 2500 * 40 = 100_000


trainer:
  max_steps: 1000_000 # 1M
  val_check_interval: 50000
  num_sanity_val_steps: 3