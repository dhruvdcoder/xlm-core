# @package _global_
# MLM on SAFE dataset with length-ref unconditional generation (see datamodule safe_mlm).

defaults:
  - override /datamodule: safe_mlm
  - override /noise_schedule: dummy
  - override /model_type: mlm
  - override /model: rotary_transformer_mlm

per_device_batch_size: 128
global_batch_size: 2048
block_size: 256
monitored_metric: val/validity
num_dataloader_workers: 4
use_bracket_safe: true
num_unconditional_prediction_examples: 1000
length_ref_file: src/xlm/tasks/safe_molgen/zinc_len.pkl

post_hoc_evaluator:
  _target_: xlm.tasks.safe_molgen.DeNovoEval
  use_bracket_safe: ${oc.select:use_bracket_safe,true}

datamodule:
  print_batch_fn: mlm.datamodule_mlm.print_batch_mlm

trainer:
  max_steps: 50_000
  val_check_interval: 50000
  num_sanity_val_steps: 3
  check_val_every_n_epoch: null

log_predictions:
  _target_: xlm.log_predictions.LogPredictions
  additional_fields_from_batch:
    - fragment_smiles
  fields_to_keep_in_output:
    - text
    - smiles
    - truth
    - truth_smiles
    - diversity
    - validity
    - uniqueness
    - qed
    - sa
    - quality
    - distance
    - fragment_smiles
    - history
  inject_target: null
  writers:
    - file
    - logger

callbacks:
  checkpoint_monitor:
    monitor: val/lm/accumulated_loss
  checkpoint_every_n_steps:
    every_n_train_steps: 1000
    keep_multiple: 25 # Keep every (keep_multiple * every_n_train_steps) permanently = 1000 * 25 = 25_000

optimizer:
  lr: 0.0001

lr_scheduler:
  name: "cosine_with_min_lr"
  min_lr: 1e-6
  num_warmup_steps: 2000
  num_cycles: 3.0
  num_training_steps: ${trainer.max_steps}
  monitor: "train/loss"
