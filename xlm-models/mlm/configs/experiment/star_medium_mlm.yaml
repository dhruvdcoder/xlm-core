# @package _global_
defaults:
  - star_easy_mlm
  - override /datamodule: star_medium_mlm

input_block_size: 36
block_size: 16
monitored_metric: val/lm/accumulated_loss

datamodule:
  print_batch_fn: mlm.datamodule_mlm.print_batch_mlm

global_components:
  tokenizer:
    _target_: xlm.datamodule.SimpleSpaceTokenizer.for_numbers
    vocab_size: 20 # 20 (easy,medium), 56 (hard)

predictor:
  top_k: 1
  top_p: null
  confidence: "top_prob"
  threshold: 0.1
  max_steps: 500

trainer:
  max_steps: 300000

lr_scheduler:
  name: "cosine_with_min_lr"
  min_lr: 1e-6
  num_warmup_steps: 2000
  num_cycles: 4
  num_training_steps: ${trainer.max_steps}
  monitor: "train/loss"
